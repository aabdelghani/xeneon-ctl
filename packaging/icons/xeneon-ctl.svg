<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c1d21"/>
      <stop offset="1" stop-color="#0d0e10"/>
    </linearGradient>
    <radialGradient id="ripple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ece81a" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ece81a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App tile -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>
  <rect x="8.5" y="8.5" width="239" height="239" rx="51.5" fill="none" stroke="#2c2d33" stroke-width="1"/>

  <!-- Ultrawide Edge panel (2560x720 ~ 3.55:1) -->
  <g>
    <rect x="40" y="99" width="176" height="58" rx="12" fill="#0b0c0e" stroke="#3a3b1e" stroke-width="1.5"/>
    <!-- faint screen grid -->
    <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
      <line x1="84" y1="103" x2="84" y2="153"/>
      <line x1="128" y1="103" x2="128" y2="153"/>
      <line x1="172" y1="103" x2="172" y2="153"/>
    </g>
    <!-- touch ripple -->
    <circle cx="150" cy="128" r="26" fill="url(#ripple)"/>
    <circle cx="150" cy="128" r="17" fill="none" stroke="#ece81a" stroke-opacity="0.85" stroke-width="2.5"/>
    <circle cx="150" cy="128" r="7" fill="#ece81a"/>
    <circle cx="150" cy="128" r="2.6" fill="#141414"/>
  </g>

  <!-- Wordmark -->
  <text x="128" y="205" text-anchor="middle" font-family="'DejaVu Sans','Ubuntu',sans-serif"
        font-size="34" font-weight="800" letter-spacing="3">
    <tspan fill="#ffffff">XE</tspan><tspan fill="#ece81a">CTL</tspan>
  </text>
</svg>
